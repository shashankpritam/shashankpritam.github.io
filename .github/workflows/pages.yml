name: Deploy org-publish site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-${{ runner.os }}-emacs

      - name: Install Emacs
        run: sudo apt-get install -y emacs-nox

      - name: Cache D2
        uses: actions/cache@v4
        with:
          path: ~/.local/bin/d2
          key: d2-${{ runner.os }}-v0.7.1

      - name: Install D2
        run: |
          if [ ! -f ~/.local/bin/d2 ]; then
            curl -fsSL https://d2lang.com/install.sh | sh -s -- --version v0.7.1
          fi
          echo "$HOME/.local/bin" >> $GITHUB_PATH


      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with org-publish
        run: emacs --batch --load publish.el

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
